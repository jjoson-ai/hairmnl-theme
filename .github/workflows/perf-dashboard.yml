name: Refresh perf dashboard

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/**'
      - '.github/SECRETS.md'
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-analytics-data

      - name: Verify required secrets are set
        env:
          GA4_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          PSI_KEY: ${{ secrets.PSI_API_KEY }}
          GA4_PROP: ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          missing=()
          [ -z "$GA4_KEY" ] && missing+=("GA4_SERVICE_ACCOUNT_KEY")
          [ -z "$PSI_KEY" ] && missing+=("PSI_API_KEY")
          [ -z "$GA4_PROP" ] && missing+=("GA4_PROPERTY_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Set them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All 3 secrets are present. GA4_KEY length: ${#GA4_KEY} chars; PSI_KEY length: ${#PSI_KEY} chars."

      - name: Write GA4 service account key
        env:
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p ~/.config
          # printf preserves bytes verbatim; echo can mangle backslashes/options
          printf '%s' "$GA4_SERVICE_ACCOUNT_KEY" > ~/.config/hairmnl-ga4-key.json
          # Validate JSON before proceeding so failures surface here, not deep in the script
          if ! python3 -c "import json,sys; json.load(open('$HOME/.config/hairmnl-ga4-key.json'))" 2>/tmp/ga4-validate.err; then
            echo "::error::GA4 service account key is not valid JSON"
            echo "Validation error:"
            cat /tmp/ga4-validate.err
            echo "File size: $(wc -c < ~/.config/hairmnl-ga4-key.json) bytes"
            echo "First 80 chars (redacted private_key):"
            head -c 80 ~/.config/hairmnl-ga4-key.json | sed 's/[A-Za-z0-9+/=]\{20,\}/[REDACTED]/g'
            echo ""
            echo "Likely cause: the secret was pasted with extra whitespace, missing braces, or "
            echo "  was set under the wrong name. Re-paste the FULL contents of"
            echo "  ~/.config/hairmnl-ga4-key.json on your local machine into the secret."
            exit 1
          fi
          # Confirm it has the expected service account fields
          python3 -c "import json; d=json.load(open('$HOME/.config/hairmnl-ga4-key.json')); assert d.get('type')=='service_account', f'Expected type=service_account, got: {d.get(\"type\")}'; print(f'  GA4 key OK — project: {d.get(\"project_id\")}, client: {d.get(\"client_email\")}')"

      - name: Run dashboard script
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: python3 scripts/build-perf-dashboard.py --psi-runs 3

      - name: Commit updated dashboard
        id: commit
        # Hard cap to bound CI-minute burn if the retry loop hangs against an
        # unresponsive remote. The loop itself does 3 attempts with 5+10+15=30s
        # max backoff, plus 3 git operations per attempt. 5 minutes is generous.
        # Per epic-audit dashboard-20260515 (Low finding).
        timeout-minutes: 5
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add dashboard/
          # NO [skip ci] in commit message — GitHub treats it globally and would
          # skip the pages.yml deploy too. Self-loop on this workflow is already
          # prevented by `paths-ignore: ['dashboard/**']` in the push trigger.
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No dashboard changes — nothing to commit."
          else
            git commit -m "chore: auto-refresh dashboard"
            # Rebase-then-push in a retry loop — protects against concurrent
            # pushes (e.g. a developer push lands while this cron is mid-run).
            # Without this, the cron randomly fails ~once per active dev day
            # (observed 2026-05-12 run 25754289844).
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $attempt failed; retrying in $((attempt * 5))s"
              sleep $((attempt * 5))
            done
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pages deploy is now triggered by pages.yml's `workflow_run` listener on
      # this workflow's successful completion. No explicit dispatch needed.
      # (Prior approach used `gh workflow run pages.yml` with GITHUB_TOKEN, which
      # fails with HTTP 403 "Resource not accessible by integration" — the
      # default token cannot trigger workflow_dispatch in any repo. See
      # pages.yml `on.workflow_run` block.)
name: Deploy dashboard to GitHub Pages

# Deploys dashboard/ folder to GitHub Pages on every push to main that
# touches anything in dashboard/. Public URL becomes:
#   https://jjoson-ai.github.io/hairmnl-theme/

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Required permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs if a newer push lands
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

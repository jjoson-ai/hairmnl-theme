name: Deploy dashboard to GitHub Pages

# Deploys dashboard/ folder to GitHub Pages on every push to main that
# touches anything in dashboard/. Public URL becomes:
#   https://jjoson-ai.github.io/hairmnl-theme/

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/pages.yml'
  # Auto-fire after the perf-dashboard refresh completes. Default GITHUB_TOKEN
  # cannot trigger workflow_dispatch (HTTP 403 "Resource not accessible by
  # integration"), so we use workflow_run instead — no PAT needed.
  # Gated to success-only via the deploy job's `if` below.
  workflow_run:
    workflows: ["Refresh perf dashboard"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

# Required permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs if a newer push lands
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed perf-dashboard run; allow push/manual/scheduled.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

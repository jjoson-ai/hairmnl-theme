name: Deploy dashboard + docs to GitHub Pages

# Publishes the Pages site at https://jjoson-ai.github.io/hairmnl-theme/
# Layout served:
#   /                            → dashboard/ (perf dashboard, root index.html)
#   /os2-migration/feasibility.html → docs/os2-migration/feasibility.html
# Fires on changes to either source tree, or to this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'docs/os2-migration/**'
      - '.github/workflows/pages.yml'
  # Auto-fire after the perf-dashboard refresh completes. Default GITHUB_TOKEN
  # cannot trigger workflow_dispatch (HTTP 403 "Resource not accessible by
  # integration"), so we use workflow_run instead — no PAT needed.
  # Gated to success-only via the deploy job's `if` below.
  workflow_run:
    workflows: ["Refresh perf dashboard"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

# Required permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs if a newer push lands
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed perf-dashboard run; allow push/manual/scheduled.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Stage Pages site (dashboard at /, docs/os2-migration/ at /os2-migration/)
        run: |
          set -e
          rm -rf _site
          mkdir -p _site/os2-migration
          cp -R dashboard/. _site/
          cp -R docs/os2-migration/. _site/os2-migration/
          echo "Staged files:"
          find _site -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

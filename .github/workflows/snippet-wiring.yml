name: Snippet + asset wiring lint

# Catches TWO regression classes:
#
# (1) yxte (2026-05-18 AM): refactor drops a {% render %} callsite while
#     keeping the snippet file on disk, silently disabling whatever the
#     snippet did.
#
# (2) Cache-shadow (2026-05-18 PM): refactor drops a
#     {{ '<file>.js' | asset_url }} reference while keeping the asset file
#     on disk. Shopify edge cache hides the regression until invalidation
#     exposes it (took 24 days last time, broke megamenu + product images
#     + sliders on live homepage; emergency revert at commit 49ae3dc).
#
# Both are now caught by scripts/check-snippet-wiring.py — see
# MIGRATION-CONTRACT.md Rules 1 + 9.

on:
  push:
    branches: [main]
    paths:
      - 'layout/**/*.liquid'
      - 'sections/**/*.liquid'
      - 'snippets/**/*.liquid'
      - 'templates/**/*.liquid'
      - 'blocks/**/*.liquid'
      - 'assets/**/*.liquid'
      - 'assets/**/*.js'
      - 'assets/**/*.css'
      - 'os2-migration/intentionally-orphan.txt'
      - 'os2-migration/intentionally-orphan-assets.txt'
      - 'scripts/check-snippet-wiring.py'
      - '.github/workflows/snippet-wiring.yml'
  pull_request:
    branches: [main]
    paths:
      - 'layout/**/*.liquid'
      - 'sections/**/*.liquid'
      - 'snippets/**/*.liquid'
      - 'templates/**/*.liquid'
      - 'blocks/**/*.liquid'
      - 'assets/**/*.liquid'
      - 'assets/**/*.js'
      - 'assets/**/*.css'
      - 'os2-migration/intentionally-orphan.txt'
      - 'os2-migration/intentionally-orphan-assets.txt'
      - 'scripts/check-snippet-wiring.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run snippet + asset wiring lint
        run: |
          set -e
          python3 scripts/check-snippet-wiring.py
          echo ""
          echo "::notice::Lint passed. See MIGRATION-CONTRACT.md for the rules."

      - name: Failure guidance
        if: failure()
        run: |
          cat <<'EOF'
          ::error::Snippet/asset wiring lint failed.

          Two possible regression classes (both caught by this lint):

          (1) SNIPPET orphan — a file in `snippets/*.liquid` is not
              rendered or included anywhere. The yxte 2026-05-18 AM
              regression: P4 wave-a refactor dropped a {% render %}
              callsite, silently disabling 23 CLS fixes for 24 hours.

          (2) ASSET orphan — a file in `assets/*.js` or `assets/*.css`
              is not referenced via `{{ '<file>' | asset_url }}` in any
              Liquid file. The cache-shadow 2026-05-18 PM escalation:
              P4 wave-a ALSO dropped jquery / custom-theme.js / shop.js
              / lazysizes / custom-theme.css loads. Shopify edge cache
              hid this for 24 days; when it invalidated, the homepage
              megamenu + product images + sliders all broke.

          To fix (per orphan):
            1. Re-add the reference in the right file
               ({% render '<name>' %} for snippets, or
               {{ '<file>' | asset_url }} for assets), OR
            2. Delete the file if it's truly dead, OR
            3. If intentionally orphan during P4 → P8 migration, add to:
                 - os2-migration/intentionally-orphan.txt (snippets), or
                 - os2-migration/intentionally-orphan-assets.txt (assets)
               with a bd-id and target_wire_by date.

          Run locally: python3 scripts/check-snippet-wiring.py
          Modes:       --snippets-only / --assets-only / --json / --verbose

          Read: MIGRATION-CONTRACT.md (Rules 1 + 9 cover this lint)
          EOF
          exit 1
